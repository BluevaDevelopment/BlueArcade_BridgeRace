# Bridge Race Module - English (UK)
# Only Bridge Race-specific content

file_version: 1
display_name: "Bridge Race"

description:
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
  - "<green>Game</green> <gray>-</gray> <yellow><bold>Bridge Race</bold></yellow>"
  - " "
  - "<white>Description:</white>"
  - "<gray>Build bridges to reach the finish line!</gray>"
  - "<gray>First to cross wins the race.</gray>"
  - " "
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"

# Vote menu
vote_menu:
  name: "<green>Bridge Race</green>"
  lore:
    - "<gray>Build your way to the finish line!</gray>"
    - "<gray>First player to finish wins.</gray>"
    - ""
    - "<white>{votes}</white> <gray>votes.</gray>"

stats:
  labels:
    finish_line_crosses: "Finish line crosses"
    blocks_placed: "Blocks placed"
    games_played: "Bridge Races played"
    wins: "Bridge Race wins"

messages:
  respawned: "<yellow>You have been respawned!</yellow>"
  deaths:
    death_block:
      - "<dark_red>X</dark_red> <red>{player}</red> <gray>stepped on a death block and got zapped back.</gray>"
      - "<dark_red>X</dark_red> <red>{player}</red> <gray>triggered a deadly tile. Back to building!</gray>"
      - "<dark_red>X</dark_red> <red>{player}</red> <gray>learned why that block glows ominously.</gray>"
    void:
      - "<dark_red>X</dark_red> <red>{player}</red> <gray>fell off their bridge.</gray>"
      - "<dark_red>X</dark_red> <red>{player}</red> <gray>missed a block and tumbled down.</gray>"
      - "<dark_red>X</dark_red> <red>{player}</red> <gray>needs to build a sturdier bridge.</gray>"
  finish:
    crossed:
      - "<dark_green>V</dark_green> <green>{player}</green> <gray>crossed the finish line at</gray> <yellow>#{position}</yellow><gray>!</gray>"
      - "<dark_green>V</dark_green> <green>{player}</green> <gray>bridged through the finish at</gray> <yellow>#{position}</yellow><gray>!</gray>"
      - "<dark_green>V</dark_green> <green>{player}</green> <gray>secured position</gray> <yellow>#{position}</yellow> <gray>at the finish!</gray>"

titles:
  finished:
    title: "<bold><gradient:dark_green:green>FINISHED!</gradient></bold>"
    subtitle: "<white>You finished in position</white> <yellow>#{position}</yellow>"

scoreboard:
  title: "<bold><gradient:aqua:light_purple>Blue Arcade</gradient></bold>"
  lines:
    - ""
    - "<white>Arena:</white> <aqua>{arena}</aqua>"
    - "<white>Game:</white> <aqua>Bridge Race</aqua>"
    - "<white>Time:</white> <aqua>{time}</aqua>"
    - ""
    - "<green>1.</green> <white>{place_1}</white> <gray>{distance_1}m</gray>"
    - "<gold>2.</gold> <white>{place_2}</white> <gray>{distance_2}m</gray>"
    - "<red>3.</red> <white>{place_3}</white> <gray>{distance_3}m</gray>"
    - "<dark_gray>4.</dark_gray> <gray>{place_4}</gray> <dark_gray>{distance_4}m</dark_gray>"
    - "<dark_gray>5.</dark_gray> <gray>{place_5}</gray> <dark_gray>{distance_5}m</dark_gray>"
    - ""
    - "<aqua>Your Position:</aqua> <white>#{bridge_race_position}</white>"
    - ""
    - "<yellow>www.blueva.net</yellow>"

setup_messages:
  set_success: "{prefix} <green>Finish line set: {blocks} blocks ({x}x{y}x{z})</green>"
  must_use_stick: "{prefix} <red>Use the Magic Stick to select the finish line area first.</red>"
  not_configured: "{prefix} <red>Finish line is not configured! Use baa game --arena={arena_id} bridge_race finishline set</red>"
  usage_finish_line: "{prefix} <yellow>Usage: baa game --arena=<id> <minigame> finishline set</yellow>"
