      1:
        name: "First plank"
        description:
          - "Play your first Bridge Race."
        conditions:
          - "{bluearcade_stat_module_bridge_race_games_played} >= 1"
        rewards:
          commands:
            - "arcadeadmin credits give {player} 10"
            - "arcadeadmin xp give {player} 10"
